name: Job Automation

on:
  schedule:
    - cron: "0 */3 * * *"   # Every 3 hours
  workflow_dispatch:          # Manual trigger from GitHub UI

jobs:
  find-and-apply:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browser
        run: playwright install chromium --with-deps

      - name: Write Google credentials file
        run: echo '${{ secrets.GOOGLE_SHEETS_CREDS }}' > credentials.json

      - name: Run job automation pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          LINKEDIN_EMAIL: ${{ secrets.LINKEDIN_EMAIL }}
          LINKEDIN_PASSWORD: ${{ secrets.LINKEDIN_PASSWORD }}
          INDEED_EMAIL: yerabatisai26@gmail.com
          GOOGLE_SHEETS_CREDS: credentials.json
          SHEET_NAME: Job Automation Tracker
          CANDIDATE_NAME: Sai Koutilya Yerabati
          CANDIDATE_EMAIL: yerabatisai26@gmail.com
          CANDIDATE_PHONE: +1-647-697-1009
          CANDIDATE_SKILLS: Kubernetes,Docker,Terraform,Ansible,Jenkins,GitHub Actions,Python,Bash,Prometheus,Grafana,OpenShift,Helm,ArgoCD,CI/CD,Linux,AWS,SRE,DevOps,ServiceNow,Splunk
          CANDIDATE_EXPERIENCE: "6"
          SALARY_MIN: "120000"
          SALARY_MAX: "160000"
          BASE_RESUME: resume_base.docx
          MIN_SCORE: "40"
          MAX_APPLY: "15"
          HEADLESS: "true"
        run: python main.py

      - name: Upload pipeline log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-log
          path: pipeline.log
          retention-days: 7
